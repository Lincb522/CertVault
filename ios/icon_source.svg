<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#FAFBFE"/>
      <stop offset="100%" stop-color="#EBE8F3"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3B9BF5"/>
      <stop offset="50%" stop-color="#5B7CF6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Subtle top-right light reflection -->
    <radialGradient id="reflection" cx="0.75" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background fills entire canvas -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- Subtle light reflection top-right -->
  <rect width="1024" height="1024" fill="url(#reflection)"/>

  <!-- === THREE CARDS (fanned out behind shield) === -->

  <!-- Card 1: Back-left, light blue, tilted left -->
  <g transform="translate(420, 490) rotate(-16)">
    <rect x="-170" y="-230" width="300" height="390" rx="24" ry="24"
          fill="#D0E2F7" opacity="0.8"/>
    <rect x="-170" y="-230" width="300" height="390" rx="24" ry="24"
          fill="none" stroke="#B8D4F0" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Card 2: Middle, white-blue, slight left tilt -->
  <g transform="translate(480, 490) rotate(-4)">
    <rect x="-160" y="-225" width="300" height="390" rx="24" ry="24"
          fill="#E3EDF9" opacity="0.8"/>
    <rect x="-160" y="-225" width="300" height="390" rx="24" ry="24"
          fill="none" stroke="#CDE0F4" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Card 3: Right, lavender/pink-purple, tilted right -->
  <g transform="translate(570, 490) rotate(11)">
    <rect x="-150" y="-220" width="300" height="390" rx="24" ry="24"
          fill="#E4D6F3" opacity="0.65"/>
    <rect x="-150" y="-220" width="300" height="390" rx="24" ry="24"
          fill="none" stroke="#D5C4EA" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- === SHIELD (front, centered) === -->
  <path d="
    M 512 230
    C 480 240, 400 265, 345 280
    Q 320 288, 320 320
    L 320 490
    Q 320 575, 400 650
    Q 455 695, 512 725
    Q 569 695, 624 650
    Q 704 575, 704 490
    L 704 320
    Q 704 288, 679 280
    C 624 265, 544 240, 512 230
    Z"
    fill="url(#shieldGrad)"/>

  <!-- Shield subtle inner highlight (top area) -->
  <path d="
    M 512 240
    C 485 248, 415 270, 365 283
    Q 345 290, 340 315
    L 340 400
    Q 420 380, 512 350
    Q 604 380, 684 400
    L 684 315
    Q 679 290, 659 283
    C 609 270, 539 248, 512 240
    Z"
    fill="white" opacity="0.1"/>

  <!-- Shield white edge highlight -->
  <path d="
    M 512 230
    C 480 240, 400 265, 345 280
    Q 320 288, 320 320
    L 320 490
    Q 320 575, 400 650
    Q 455 695, 512 725
    Q 569 695, 624 650
    Q 704 575, 704 490
    L 704 320
    Q 704 288, 679 280
    C 624 265, 544 240, 512 230
    Z"
    fill="none" stroke="white" stroke-width="3" opacity="0.2"/>

  <!-- === KEYHOLE === -->
  <!-- Circle -->
  <circle cx="512" cy="445" r="46" fill="white"/>
  <!-- Slot (tapered downward) -->
  <path d="M 492 472  L 532 472  L 522 568  Q 512 578, 502 568  Z" fill="white"/>

  <!-- === GREEN VERIFICATION BADGE === -->
  <!-- White ring -->
  <circle cx="678" cy="295" r="48" fill="white"/>
  <!-- Green fill -->
  <circle cx="678" cy="295" r="40" fill="#22C55E"/>
  <!-- White checkmark -->
  <polyline points="657,295 673,312 700,278"
            fill="none" stroke="white" stroke-width="7.5"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
