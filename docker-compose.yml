version: '3.8'

services:
  server:
    build: ./server
    container_name: cert-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - server-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001

  client:
    build: ./client
    container_name: cert-client
    restart: unless-stopped
    ports:
      - "9090:80"
    depends_on:
      - server

volumes:
  server-data:
    driver: local
