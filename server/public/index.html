<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="/app-icon.png">
<title>CertVault</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif;background:#0c0c0e;color:#e2e0dc;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

.grain{position:fixed;inset:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.page{max-width:480px;margin:0 auto;padding:80px 20px 60px;min-height:100vh;display:flex;flex-direction:column}

.logo{text-align:center;margin-bottom:56px}
.logo svg{width:56px;height:56px;margin-bottom:16px}
.logo h1{font-size:24px;font-weight:700;letter-spacing:.5px}
.logo p{font-size:13px;color:#666;margin-top:8px;line-height:1.6}

.features{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:36px}
.feat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:20px 16px;text-align:center}
.feat svg{width:24px;height:24px;margin-bottom:10px;opacity:.7}
.feat h3{font-size:13px;font-weight:600;margin-bottom:3px}
.feat p{font-size:11px;color:#666;line-height:1.4}

.enter{display:block;text-align:center;padding:16px;background:linear-gradient(135deg,#2a2520,#1e1c18);border:1px solid rgba(196,149,106,.2);border-radius:14px;text-decoration:none;color:#c4956a;font-size:15px;font-weight:600;letter-spacing:.5px;transition:all .25s;margin-bottom:40px}
.enter:hover{border-color:rgba(196,149,106,.4);box-shadow:0 0 30px rgba(196,149,106,.08);transform:translateY(-1px)}
.enter span{font-size:12px;color:#555;font-weight:400;display:block;margin-top:4px}

.status{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:18px 20px;margin-bottom:40px}
.status-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.status-row:not(:last-child){border-bottom:1px solid rgba(255,255,255,.04)}
.status-row .label{font-size:13px;color:#666}
.status-row .val{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.status-row .dot{width:6px;height:6px;border-radius:50%;background:#4ade80}
.status-row .dot.off{background:#f87171}

footer{margin-top:auto;text-align:center}
footer p{font-size:11px;color:#333}
footer a{color:#333;text-decoration:none}
footer a:hover{color:#c4956a}
</style>
</head>
<body>
<div class="grain"></div>
<div class="page">

  <div class="logo">
    <svg viewBox="0 0 56 56" fill="none">
      <rect width="56" height="56" rx="13" fill="#1a1816"/>
      <rect x="1" y="1" width="54" height="54" rx="12" stroke="#c4956a" stroke-width=".5" opacity=".3"/>
      <path d="M28 14a6 6 0 0 1 6 6c0 2.5-1.5 4.5-3.5 5.5L32 38h-8l1.5-12.5A6 6 0 0 1 28 14z" fill="#c4956a" opacity=".8"/>
      <circle cx="28" cy="20" r="3" fill="#1a1816"/>
      <circle cx="28" cy="20" r="1.5" fill="#c4956a" opacity=".5"/>
      <path d="M20 40h16" stroke="#c4956a" stroke-width="1.5" stroke-linecap="round" opacity=".4"/>
      <path d="M22 43h12" stroke="#c4956a" stroke-width="1" stroke-linecap="round" opacity=".2"/>
    </svg>
    <h1>CertVault</h1>
    <p>Apple 开发者资源管理平台</p>
  </div>

  <div class="features">
    <div class="feat">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c4956a" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>
      <h3>签名证书</h3>
      <p>p12 / cer 签发和管理</p>
    </div>
    <div class="feat">
      <svg viewBox="0 0 24 24" fill="none" stroke="#8faec4" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
      <h3>设备 UDID</h3>
      <p>UDID 添加与设备注册</p>
    </div>
    <div class="feat">
      <svg viewBox="0 0 24 24" fill="none" stroke="#a68dc4" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <h3>描述文件</h3>
      <p>mobileprovision 生成</p>
    </div>
    <div class="feat">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6aba8a" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <h3>推送调试</h3>
      <p>APNs 调试与推送</p>
    </div>
  </div>

  <a class="enter" href="/admin">
    打开面板
    <span>需要登录</span>
  </a>

  <div class="status" id="statusPanel">
    <div class="status-row">
      <span class="label">服务状态</span>
      <span class="val"><span class="dot" id="dotStatus"></span><span id="txtStatus">检测中</span></span>
    </div>
    <div class="status-row">
      <span class="label">延迟</span>
      <span class="val" id="txtLatency">--</span>
    </div>
    <div class="status-row">
      <span class="label">运行环境</span>
      <span class="val">Node.js</span>
    </div>
  </div>

  <footer>
    <p>CertVault · Apple Developer Resource Manager</p>
  </footer>

</div>

<script>
(async () => {
  const dot = document.getElementById('dotStatus');
  const txt = document.getElementById('txtStatus');
  const lat = document.getElementById('txtLatency');
  try {
    const t0 = performance.now();
    const r = await fetch('/api/health', { signal: AbortSignal.timeout(5000) });
    const ms = Math.round(performance.now() - t0);
    if (r.ok) {
      dot.style.background = '#4ade80';
      txt.textContent = '正常';
      lat.textContent = ms + 'ms';
    } else {
      dot.classList.add('off');
      txt.textContent = '挂了';
      lat.textContent = ms + 'ms';
    }
  } catch {
    dot.classList.add('off');
    txt.textContent = '连不上';
    lat.textContent = '--';
  }
})();
</script>
</body>
</html>
