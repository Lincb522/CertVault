<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/admin/app-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>CertVault - 管理后台</title>
    <style>
      :root {
        --nask-text-secondary: #5F6680;
        --nask-text-muted: #7C8499;
        --nask-sidebar-text: #5F6680;
        --glass-blur: 20px;
        --glass-bg: rgba(255, 255, 255, 0.72);
        --glass-border: rgba(255, 255, 255, 0.45);
        --glass-card-bg: rgba(255, 255, 255, 0.55);
        --glass-card-border: rgba(255, 255, 255, 0.6);
        --glass-shadow: 0 4px 24px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
      }
      html.dark {
        --nask-text-secondary: #B8BFCF;
        --nask-text-muted: #919BB0;
        --nask-sidebar-text: #B8BFCF;
        --glass-bg: rgba(32, 36, 39, 0.72);
        --glass-border: rgba(255, 255, 255, 0.06);
        --glass-card-bg: rgba(40, 44, 48, 0.6);
        --glass-card-border: rgba(255, 255, 255, 0.05);
        --glass-shadow: 0 4px 24px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0, 0, 0, 0.15);
      }
      .sidebar {
        background: var(--glass-bg) !important;
        -webkit-backdrop-filter: blur(var(--glass-blur));
        backdrop-filter: blur(var(--glass-blur));
        border-right-color: var(--glass-border) !important;
      }
      .main-header {
        background: var(--glass-bg) !important;
        -webkit-backdrop-filter: blur(var(--glass-blur));
        backdrop-filter: blur(var(--glass-blur));
        border-bottom-color: var(--glass-border) !important;
      }
      .content-card {
        background: var(--glass-card-bg) !important;
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        border: 1px solid var(--glass-card-border) !important;
        box-shadow: var(--glass-shadow) !important;
      }
      .content-card:hover {
        box-shadow: var(--glass-shadow), 0 0 0 1px var(--glass-card-border) !important;
      }
      .el-dialog {
        --el-dialog-bg-color: var(--nask-surface, #fff);
        background: var(--nask-surface, #fff) !important;
        border: 1px solid var(--glass-card-border);
        border-radius: 20px !important;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18), 0 8px 24px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0,0,0,0.04) !important;
      }
      html.dark .el-dialog {
        background: var(--nask-surface, #1E293B) !important;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255,255,255,0.06) !important;
      }
      .el-dialog__header {
        border-bottom: 1px solid var(--nask-border, rgba(0,0,0,0.06));
        padding: 20px 24px !important;
        margin: 0 !important;
        background: transparent;
      }
      .el-dialog__title {
        font-weight: 700 !important;
        font-size: 16px !important;
      }
      .el-dialog__body {
        padding: 20px 24px !important;
        background: var(--nask-bg, #F6F7FA);
      }
      html.dark .el-dialog__body {
        background: var(--nask-bg, #111315);
      }
      .el-dialog__footer {
        border-top: 1px solid var(--nask-border, rgba(0,0,0,0.06));
        padding: 14px 24px !important;
        background: var(--nask-surface, #fff);
      }
      html.dark .el-dialog__footer {
        background: var(--nask-surface, #202427);
      }
      .el-overlay {
        background-color: rgba(15, 23, 42, 0.45) !important;
        -webkit-backdrop-filter: blur(6px);
        backdrop-filter: blur(6px);
      }
      html.dark .el-overlay {
        background-color: rgba(0, 0, 0, 0.55) !important;
      }
      .el-message-box {
        background: var(--nask-surface, #fff) !important;
        border-radius: 16px !important;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18), 0 0 0 1px rgba(0,0,0,0.04) !important;
        border: none !important;
      }
      html.dark .el-message-box {
        background: var(--nask-surface, #1E293B) !important;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.06) !important;
      }
      .el-select-dropdown, .el-dropdown-menu, .el-popper {
        background: var(--nask-surface, #fff) !important;
        border: 1px solid var(--nask-border, rgba(0,0,0,0.06)) !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12) !important;
        border-radius: 12px !important;
      }
      html.dark .el-select-dropdown, html.dark .el-dropdown-menu, html.dark .el-popper {
        background: var(--nask-surface, #1E293B) !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4) !important;
      }
      .preset-card {
        background: var(--glass-card-bg) !important;
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        border-color: var(--glass-card-border) !important;
      }
      .preset-card:hover {
        background: rgba(6, 109, 230, 0.06) !important;
        border-color: rgba(6, 109, 230, 0.25) !important;
      }
      .sidebar-user {
        background: var(--glass-card-bg) !important;
        border: 1px solid var(--glass-card-border);
      }
      .el-table, .el-table__body-wrapper { background: transparent !important; }
      .el-table th.el-table__cell { background: var(--glass-card-bg) !important; }
      .main-content { position: relative; }
      .main-content::before {
        content: ''; position: fixed; top: -20%; right: -10%; width: 500px; height: 500px; border-radius: 50%;
        background: radial-gradient(circle, rgba(6, 109, 230, 0.08) 0%, transparent 70%);
        pointer-events: none; z-index: -1;
      }
      .main-content::after {
        content: ''; position: fixed; bottom: -15%; left: 10%; width: 600px; height: 600px; border-radius: 50%;
        background: radial-gradient(circle, rgba(144, 106, 252, 0.06) 0%, transparent 70%);
        pointer-events: none; z-index: -1;
      }
      html.dark .main-content::before { background: radial-gradient(circle, rgba(6, 109, 230, 0.12) 0%, transparent 70%); }
      html.dark .main-content::after { background: radial-gradient(circle, rgba(144, 106, 252, 0.08) 0%, transparent 70%); }
      .el-text[style*="909399"] { color: var(--nask-text-secondary) !important; }
      /* 全局覆盖 Element Plus 灰色文字 */
      [style*="color: #909399"], [style*="color:#909399"],
      [style*="color: rgb(144, 147, 153)"] { color: var(--nask-text-secondary) !important; }
      [style*="color: #a8abb2"], [style*="color:#a8abb2"] { color: var(--nask-text-secondary) !important; }
      [style*="color: #c0c4cc"], [style*="color:#c0c4cc"] { color: var(--nask-text-muted) !important; }
      .el-form-item__label { color: var(--nask-text) !important; }
      .el-descriptions__label { color: var(--nask-text-secondary) !important; font-weight: 600 !important; }
      .el-descriptions__content { color: var(--nask-text) !important; }
      .el-table .cell { color: var(--nask-text) !important; }
      .el-table th .cell { color: var(--nask-text-secondary) !important; }
      .el-empty__description p { color: var(--nask-text-secondary) !important; }
      .el-upload__tip { color: var(--nask-text-secondary) !important; }
      .el-select-dropdown__item { color: var(--nask-text) !important; }
      .el-radio__label, .el-checkbox__label { color: var(--nask-text) !important; }
      .el-collapse-item__header { color: var(--nask-text) !important; }
      .el-collapse-item__content { color: var(--nask-text) !important; }
      .el-steps .el-step__title { color: var(--nask-text) !important; }
      .el-steps .el-step__description { color: var(--nask-text-secondary) !important; }
      .el-tag--info { color: var(--nask-text-secondary) !important; }
      .el-input__inner::placeholder { color: var(--nask-text-muted) !important; }
      .el-textarea__inner::placeholder { color: var(--nask-text-muted) !important; }
      .el-alert .el-alert__description { color: var(--nask-text-secondary) !important; }
      .el-divider__text { color: var(--nask-text-secondary) !important; background: transparent !important; }
      .el-pagination { color: var(--nask-text) !important; }
      .el-pagination .el-pager li { color: var(--nask-text-secondary) !important; }
      .page-header p, .card-header p { color: var(--nask-text-secondary) !important; }
    </style>
    <script type="module" crossorigin src="/admin/assets/index-kvv3wBvZ.js"></script>
    <link rel="stylesheet" crossorigin href="/admin/assets/index-CerbDQNm.css">
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
